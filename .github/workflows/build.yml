name: Build macOS DMG

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Detect whether signing secrets are present ────────────────────────────
      - name: Check signing secrets
        id: signing
        run: |
          if [ -n "$CSC_CONTENT_RAW" ] && [ -n "$CSC_KEY_PASSWORD_RAW" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi
        env:
          CSC_CONTENT_RAW: ${{ secrets.CSC_CONTENT }}
          CSC_KEY_PASSWORD_RAW: ${{ secrets.CSC_KEY_PASSWORD }}

      # ── Decode certificate (only when signing is available) ───────────────────
      - name: Decode signing certificate
        if: steps.signing.outputs.available == 'true'
        run: |
          echo "${{ secrets.CSC_CONTENT }}" | base64 --decode > /tmp/certificate.p12
          echo "CSC_LINK=/tmp/certificate.p12" >> $GITHUB_ENV

      # ── Build signed + notarized ──────────────────────────────────────────────
      - name: Build signed DMG
        if: steps.signing.outputs.available == 'true'
        env:
          CSC_LINK: ${{ env.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --universal --publish never

      # ── Build unsigned (no secrets set) ───────────────────────────────────────
      - name: Build unsigned DMG
        if: steps.signing.outputs.available == 'false'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          SKIP_NOTARIZE: "true"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --universal --publish never

      # ── Upload artifact (every push) ──────────────────────────────────────────
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: Kaizen-Board-${{ github.sha }}
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 30

      # ── Publish GitHub Release (tags only) ───────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Kaizen Board ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
